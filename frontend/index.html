<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction Search | Browse & Discover</title>
    <meta name="description" content="Search through auction listings, browse items, and discover deals">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🔨</span>
                    <span class="logo-text">AuctionSearch</span>
                </div>
                <div class="search-box">
                    <div class="search-input-wrapper">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="M21 21l-4.35-4.35"></path>
                        </svg>
                        <input type="text" id="searchInput" class="search-input"
                            placeholder="Search items (e.g., 'fragrance', 'makeup', 'electronics')..."
                            autocomplete="off">
                        <button class="search-clear" id="clearBtn" style="display: none;">✕</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <!-- Filters -->
                <div class="filters">
                    <div class="filter-group">
                        <label class="filter-label">Auction Name</label>
                        <select id="auctionNameFilter" class="filter-select">
                            <option value="all">All Auctions</option>
                            <!-- Options populated dynamically -->
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Auction Date</label>
                        <select id="auctionDateFilter" class="filter-select">
                            <option value="all">All Dates</option>
                            <!-- Options populated dynamically -->
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Status</label>
                        <select id="statusFilter" class="filter-select">
                            <option value="all">All</option>
                            <option value="sold">Sold</option>
                            <option value="not_sold">Not Sold</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">From Lot #</label>
                        <input type="text" id="startLot" class="filter-input" placeholder="e.g. 100">
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">VAT</label>
                        <select id="vatFilter" class="filter-select">
                            <option value="all">All Items</option>
                            <option value="vat">+VAT Only</option>
                            <option value="no_vat">No VAT Only</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Sort By</label>
                        <select id="sortBy" class="filter-select">
                            <option value="lot_number">Lot Number</option>
                            <option value="sold_price_asc">Price: Low to High</option>
                            <option value="sold_price_desc">Price: High to Low</option>
                            <option value="item_name">Name A-Z</option>
                        </select>
                    </div>
                    <button class="filter-btn" id="searchBtn">
                        <span>Search</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Tabs -->
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="all">All Listings</button>
            <button class="tab-btn" data-tab="favorites">My Favorites</button>
        </div>

        <!-- Results Section -->
        <section class="results-section">
            <div class="results-header">
                <h2 class="results-title">
                    <span id="resultsCount">0</span> Results
                </h2>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid" title="Grid View">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                        </svg>
                    </button>
                    <button class="view-btn" data-view="list" title="List View">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <rect x="3" y="4" width="18" height="4" />
                            <rect x="3" y="10" width="18" height="4" />
                            <rect x="3" y="16" width="18" height="4" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="results-grid" id="resultsGrid">
                <!-- Results will be populated here -->
            </div>

            <!-- Loading State -->
            <div class="loading" id="loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p>Searching...</p>
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">🔍</div>
                <h3>No results found</h3>
                <p>Try adjusting your search terms or filters</p>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display: none;">
                <button class="page-btn" id="prevBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6" />
                    </svg>
                    Previous
                </button>
                <span class="page-info" id="pageInfo">Page 1 of 1</span>
                <button class="page-btn" id="nextBtn">
                    Next
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18l6-6-6-6" />
                    </svg>
                </button>
            </div>
        </section>

        <!-- Item Modal -->
        <div class="modal" id="itemModal">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <button class="modal-close" id="modalClose">✕</button>
                <div class="modal-body" id="modalBody">
                    <!-- Modal content populated dynamically -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
