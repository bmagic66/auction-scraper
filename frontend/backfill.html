<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction Backfill Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .backfill-container {
            max-width: 600px;
            margin: 60px auto;
            background: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 16px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-box {
            margin-top: 24px;
            padding: 16px;
            background: var(--bg-dark);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            min-height: 100px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            color: var(--text-secondary);
            display: none;
        }

        .status-box.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🔨</span>
                    <span class="logo-text">To the Cloud</span>
                </div>
            </div>
        </header>

        <main class="backfill-container">
            <h1 class="search-title" style="font-size: 28px; margin-bottom: 24px;">Trigger Backfill</h1>

            <div class="form-group">
                <label class="form-label">Select Auction</label>
                <select id="auctionSelect" class="form-control">
                    <option value="">Loading auctions...</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Live Auction URL</label>
                <input type="url" id="urlInput" class="form-control"
                    placeholder="https://gaplive-eu.globalauctionplatform.com/..." required>
            </div>

            <button id="startBtn" class="btn-primary">Start Backfill</button>

            <div id="statusBox" class="status-box"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="backfill.js"></script>
</body>

</html>
